global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otelcol
    static_configs:
      - targets: ['otelcol:8889']

  # Tempo span metrics / service graph (generated from traces)
  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']
    metrics_path: /metrics
